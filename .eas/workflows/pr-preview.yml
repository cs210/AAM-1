name: PR Preview Update

# Publishes a scoped OTA update for every PR so reviewers can test the exact
# JS bundle on a device running the dev-client or preview build before merging.
#
# How to use:
#   1. Install a dev-client or preview build on your device.
#   2. In the Expo dev menu, switch to the update branch "pr-<number>".
#   3. The PR's JS bundle loads automatically – no rebuild needed.

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  publish_ios_preview:
    name: Publish iOS preview update
    type: update
    params:
      branch: pr-${{ github.event.pull_request.number }}
      platform: ios

  publish_android_preview:
    name: Publish Android preview update
    type: update
    params:
      branch: pr-${{ github.event.pull_request.number }}
      platform: android
