name: Publish OTA Update

# Manual trigger – force-push the latest JS bundle to production users.
# Use for hotfixes or copy/config changes when you know natives haven't changed.
#
# EAS Update only delivers this to devices whose native fingerprint matches
# the current production build, so it is safe to run at any time.
#
# Run via:  eas workflow:run .eas/workflows/ota-update.yml

jobs:
  publish_ios_update:
    name: Publish iOS OTA update
    type: update
    params:
      branch: production
      platform: ios

  publish_android_update:
    name: Publish Android OTA update
    type: update
    params:
      branch: production
      platform: android
