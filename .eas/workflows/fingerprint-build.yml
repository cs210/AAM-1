name: Build on Fingerprint Change

# Triggered on every push to main.
# 1. Computes the current native fingerprint for iOS and Android.
# 2. If the fingerprint has changed (native code / deps changed), builds:
#    - iOS dev client  → distributed internally (for the team to install)
#    - iOS production  → submitted to TestFlight automatically
#    - Android dev     → distributed internally
#    - Android preview → uploaded to Play Store internal track (optional, see submit job)
# 3. If nothing native changed, this workflow is a no-op – the OTA
#    update published by ota-update.yml is sufficient.

on:
  push:
    branches:
      - main

jobs:
  # ── Fingerprint check ──────────────────────────────────────────────────────
  fingerprint:
    name: Check native fingerprint
    type: fingerprint
    working_directory: apps/mobile
    params:
      platform: all

  # ── iOS dev client ─────────────────────────────────────────────────────────
  build_ios_dev:
    name: Build iOS dev client
    needs: [fingerprint]
    # Only run when the iOS native fingerprint differs from the last build.
    if: ${{ needs.fingerprint.outputs.ios.fingerprint_changed == 'true' }}
    type: build
    working_directory: apps/mobile
    params:
      platform: ios
      profile: development

  # ── iOS production (→ TestFlight) ──────────────────────────────────────────
  build_ios_production:
    name: Build iOS production
    needs: [fingerprint]
    if: ${{ needs.fingerprint.outputs.ios.fingerprint_changed == 'true' }}
    type: build
    working_directory: apps/mobile
    params:
      platform: ios
      profile: production

  submit_ios_testflight:
    name: Submit iOS → TestFlight
    needs: [build_ios_production]
    type: submit
    working_directory: apps/mobile
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios_production.outputs.build_id }}

  # ── Android dev client ─────────────────────────────────────────────────────
  build_android_dev:
    name: Build Android dev client
    needs: [fingerprint]
    if: ${{ needs.fingerprint.outputs.android.fingerprint_changed == 'true' }}
    type: build
    working_directory: apps/mobile
    params:
      platform: android
      profile: development
