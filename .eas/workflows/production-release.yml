name: Production Release

# Manual-only workflow (no `on:` = only runs when triggered explicitly).
# Run via EAS dashboard or: eas workflow:run .eas/workflows/production-release.yml
#
# Pipeline:
#   1. Build iOS + Android production binaries in parallel
#   2. Submit iOS → App Store / TestFlight  }  in parallel
#      Submit Android → Play Store         }
#   3. Publish OTA update to production branch (after both submits)
#
# Uncomment the tag trigger below to also fire automatically on semver tags:
# on:
#   push:
#     tags:
#       - 'v*'

jobs:
  # ── Native builds (parallel) ───────────────────────────────────────────────
  build_ios:
    name: Build iOS production
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android production
    type: build
    params:
      platform: android
      profile: production

  # ── Store submissions (parallel, each waits for its own build) ─────────────
  submit_ios:
    name: Submit iOS → App Store / TestFlight
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}

  submit_android:
    name: Submit Android → Play Store
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}

  # ── OTA update (after both submissions succeed) ────────────────────────────
  publish_ios_update:
    name: Publish iOS OTA update
    needs: [submit_ios]
    type: update
    params:
      branch: production
      platform: ios

  publish_android_update:
    name: Publish Android OTA update
    needs: [submit_android]
    type: update
    params:
      branch: production
      platform: android
